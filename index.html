<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>天霜纪 — 龙裔传说</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Noto+Serif+SC:wght@400;600;700;900&family=MedievalSharp&display=swap');
:root {
  --bg-dark: #0a0a0f; --bg-panel: #12121aee; --bg-panel-solid: #15151f;
  --gold: #c8a84e; --gold-bright: #f0d060; --gold-dim: #8a6d2b;
  --blood: #8b1a1a; --blood-bright: #c62828; --frost: #4fc3f7; --frost-dim: #1a3a5c;
  --magicka: #7c4dff; --stamina: #66bb6a; --health: #c62828;
  --text: #d4c8a0; --text-dim: #7a7060; --text-bright: #f5ead0;
  --border: #2a2520; --border-light: #3d352a;
  --font-display: 'Cinzel', 'Noto Serif SC', serif;
  --font-body: 'Noto Serif SC', 'Cinzel', serif;
  --font-rune: 'MedievalSharp', cursive;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
  --nav-height: 56px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { height: 100%; }
body {
  width:100%; height:100%;
  min-height: 100dvh;
  overflow:hidden;
  background:var(--bg-dark);
  color:var(--text);
  font-family:var(--font-body);
  font-size:14px;
}
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:#0a0a0f; }
::-webkit-scrollbar-thumb { background:var(--gold-dim); border-radius:3px; }
button { font-family:var(--font-body); cursor:pointer; border:none; outline:none; transition:all .2s; }
#app { width:100%; height:100%; display:flex; flex-direction:column; }

/* ============================================================
   TITLE SCREEN
   ============================================================ */
.title-screen {
  position:fixed; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:1000;
  background: radial-gradient(ellipse at 50% 30%, #1a1520 0%, #0a0a0f 60%, #000 100%);
  overflow-y: auto;
  padding: 20px 20px calc(20px + var(--safe-bottom));
}
.title-screen::before {
  content:''; position:absolute; inset:0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L32 28L60 30L32 32L30 60L28 32L0 30L28 28Z' fill='%23c8a84e08'/%3E%3C/svg%3E") repeat;
  animation: starTwinkle 8s ease-in-out infinite;
  pointer-events: none;
}
@keyframes starTwinkle { 0%,100%{opacity:.3} 50%{opacity:.8} }
.title-dragon { font-size:100px; margin-bottom:10px; filter:drop-shadow(0 0 30px #c8a84e66); animation: dragonFloat 4s ease-in-out infinite; }
@keyframes dragonFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }
.title-text { font-family:var(--font-display); font-size:48px; font-weight:900; letter-spacing:12px;
  background:linear-gradient(180deg, #f0d060 0%, #c8a84e 40%, #8a6d2b 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:5px; }
.title-sub { font-family:var(--font-display); font-size:18px; color:var(--gold-dim); letter-spacing:8px; margin-bottom:40px; }
.title-btn { display:block; width:280px; padding:14px 0; margin:8px auto; font-family:var(--font-display); font-size:16px; letter-spacing:4px;
  background:transparent; border:1px solid var(--gold-dim); color:var(--gold); position:relative; overflow:hidden; }
.title-btn:hover { background:linear-gradient(90deg, transparent, #c8a84e22, transparent); border-color:var(--gold); color:var(--gold-bright); text-shadow:0 0 10px #c8a84e88; }
.title-btn::before { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%;
  background:linear-gradient(90deg, transparent, #c8a84e15, transparent); transition:left .5s; }
.title-btn:hover::before { left:100%; }
.title-version { margin-top:20px; color:var(--text-dim); font-size:12px; letter-spacing:2px; text-align:center; }

/* ============================================================
   CHARACTER CREATION
   ============================================================ */
.char-create {
  position:fixed; inset:0;
  display:flex; flex-direction:column; align-items:center;
  z-index:999;
  background:radial-gradient(ellipse at 50% 20%, #1a1018 0%, #0a0a0f 70%);
  overflow-y:auto;
  padding: 40px 20px calc(40px + var(--safe-bottom));
}
.cc-title { font-family:var(--font-display); font-size:28px; color:var(--gold); letter-spacing:6px; margin-bottom:30px; }
.cc-section { margin-bottom:25px; width:600px; max-width:90%; }
.cc-label { font-size:13px; color:var(--gold-dim); letter-spacing:3px; margin-bottom:8px; text-transform:uppercase; }
.cc-input { width:100%; padding:12px 16px; background:#1a1a24; border:1px solid var(--border); color:var(--text-bright);
  font-family:var(--font-body); font-size:16px; outline:none; }
.cc-input:focus { border-color:var(--gold-dim); }
.race-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
.race-card { padding:12px 8px; text-align:center; background:#1a1a24; border:1px solid var(--border); cursor:pointer; transition:all .2s; }
.race-card:hover { border-color:var(--gold-dim); background:#222230; }
.race-card.selected { border-color:var(--gold); background:linear-gradient(180deg, #2a2520, #1a1a24); box-shadow:0 0 15px #c8a84e33; }
.race-icon { font-size:28px; margin-bottom:4px; }
.race-name { font-size:12px; color:var(--text); font-weight:600; }
.race-bonus { font-size:10px; color:var(--text-dim); margin-top:3px; }
.cc-confirm { padding:14px 60px; font-family:var(--font-display); font-size:16px; letter-spacing:4px; margin-top:20px;
  background:linear-gradient(180deg, #2a2010, #1a1508); border:1px solid var(--gold-dim); color:var(--gold); }
.cc-confirm:hover { border-color:var(--gold); background:linear-gradient(180deg, #3a3020, #2a2010); box-shadow:0 0 20px #c8a84e44; }

/* ============================================================
   DESKTOP GAME LAYOUT
   ============================================================ */
.game-container {
  display:grid;
  grid-template-rows: auto 1fr auto;
  grid-template-columns: 300px 1fr 280px;
  width:100%; height:100%;
}
.top-bar {
  grid-column:1/-1;
  display:flex; align-items:center; padding:6px 16px; gap:16px;
  background:linear-gradient(180deg, #15151f, #0e0e16);
  border-bottom:1px solid var(--border);
  height:48px;
}
.compass { display:flex; align-items:center; gap:8px; margin-right:auto; }
.compass-dir { font-family:var(--font-rune); font-size:11px; color:var(--text-dim); padding:2px 6px; }
.compass-dir.active { color:var(--gold); text-shadow:0 0 8px #c8a84e88; }
.stat-bars { display:flex; gap:12px; align-items:center; flex:1; justify-content:center; }
.stat-bar { display:flex; align-items:center; gap:6px; }
.bar-label { font-size:10px; letter-spacing:1px; color:var(--text-dim); min-width:18px; text-align:right; }
.bar-track { width:140px; height:14px; background:#1a1a24; border:1px solid #2a2a34; position:relative; overflow:hidden; }
.bar-fill { height:100%; transition:width .5s ease; position:relative; }
.bar-fill::after { content:''; position:absolute; top:0; left:0; right:0; height:40%; background:linear-gradient(180deg, rgba(255,255,255,.15), transparent); }
.bar-fill.health { background:linear-gradient(90deg, #8b1a1a, #c62828); }
.bar-fill.magicka { background:linear-gradient(90deg, #4a148c, #7c4dff); }
.bar-fill.stamina { background:linear-gradient(90deg, #2e7d32, #66bb6a); }
.top-info { display:flex; align-items:center; gap:16px; margin-left:auto; }
.top-level { font-family:var(--font-display); font-size:13px; color:var(--gold); }
.top-gold { font-size:13px; color:var(--gold-bright); }
.top-time { font-size:11px; color:var(--text-dim); }

/* Left Panel */
.left-panel { background:var(--bg-panel); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.panel-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
.panel-tab { flex:1; padding:8px; text-align:center; font-size:11px; letter-spacing:2px; color:var(--text-dim); cursor:pointer;
  background:transparent; border-bottom:2px solid transparent; }
.panel-tab.active { color:var(--gold); border-bottom-color:var(--gold-dim); }
.panel-content { flex:1; overflow-y:auto; }

/* Map */
.world-map { width:100%; aspect-ratio:1; position:relative; background:#0e1118;
  background-image: radial-gradient(ellipse at 30% 20%, #1a2530 0%, transparent 40%),
    radial-gradient(ellipse at 70% 70%, #1a1520 0%, transparent 35%),
    radial-gradient(ellipse at 50% 50%, #151a18 0%, transparent 50%); }
.map-location { position:absolute; cursor:pointer; text-align:center; transform:translate(-50%,-50%); transition:all .2s; z-index:2; }
.map-location:hover { transform:translate(-50%,-50%) scale(1.15); }
.map-loc-icon { font-size:18px; filter:drop-shadow(0 0 4px #000); }
.map-loc-name { font-size:9px; color:var(--text-dim); white-space:nowrap; margin-top:1px; }
.map-location.current .map-loc-name { color:var(--gold); }
.map-location.current .map-loc-icon { filter:drop-shadow(0 0 8px #c8a84e88); }
.map-player { position:absolute; width:10px; height:10px; background:var(--gold-bright); border-radius:50%; transform:translate(-50%,-50%);
  box-shadow:0 0 10px #f0d060, 0 0 20px #c8a84e88; z-index:5; transition:all 1s ease; }
.map-terrain { position:absolute; font-size:8px; color:#ffffff15; pointer-events:none; }

/* Quest Log */
.quest-log { padding:10px; }
.ql-section { margin-bottom:12px; }
.ql-header { font-size:11px; color:var(--gold-dim); letter-spacing:2px; padding-bottom:4px; border-bottom:1px solid var(--border); margin-bottom:6px; }
.ql-item { padding:6px 8px; margin-bottom:3px; background:#1a1a2488; border-left:2px solid var(--gold-dim); cursor:pointer; transition:all .2s; }
.ql-item:hover { background:#1a1a2488; border-left-color:var(--gold); }
.ql-item.active { border-left-color:var(--gold-bright); background:#2a2520aa; }
.ql-item-name { font-size:12px; color:var(--text); }
.ql-item-desc { font-size:10px; color:var(--text-dim); margin-top:2px; }

/* Center Panel */
.center-panel { display:flex; flex-direction:column; background:var(--bg-dark); overflow:hidden; position:relative; }
.scene-bg { position:absolute; inset:0; opacity:.3; transition:all 1s; z-index:0; pointer-events:none; }
.narrative-area { flex:1; min-height:0; overflow-y:auto; padding:24px 32px; position:relative; z-index:1; }
.narr-text { font-size:15px; line-height:2; color:var(--text); margin-bottom:16px; animation:fadeInUp .5s ease; }
.narr-text.important { color:var(--gold-bright); font-weight:600; text-shadow:0 0 10px #c8a84e44; }
.narr-text.system { color:var(--text-dim); font-style:italic; font-size:13px; }
.narr-text.combat { color:var(--blood-bright); }
.narr-text.magic { color:var(--frost); }
.narr-text.shout { color:var(--gold-bright); font-family:var(--font-display); font-size:18px; letter-spacing:4px; text-shadow:0 0 20px #c8a84e88; }
.narr-divider { width:60px; height:1px; background:linear-gradient(90deg, transparent, var(--gold-dim), transparent); margin:20px auto; }
@keyframes fadeInUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.dialogue-box { background:#15151fee; border:1px solid var(--border); padding:16px; margin:12px 0; position:relative; }
.dialogue-speaker { font-size:12px; color:var(--gold); letter-spacing:2px; margin-bottom:6px; }
.dialogue-text { font-size:14px; line-height:1.8; }

/* Choices */
.choices-area { flex-shrink:0; padding:12px 32px 16px; border-top:1px solid var(--border); position:relative; z-index:1; }
.choice-btn { display:block; width:100%; padding:10px 16px; margin-bottom:6px; text-align:left; font-size:14px;
  background:linear-gradient(90deg, #1a1a2400, #1a1a24aa, #1a1a2400); border:1px solid var(--border); color:var(--text); position:relative; }
.choice-btn:hover { border-color:var(--gold-dim); color:var(--gold-bright); background:linear-gradient(90deg, transparent, #2a251088, transparent); }
.choice-btn::before { content:'▸'; margin-right:8px; color:var(--gold-dim); }
.choice-btn:hover::before { color:var(--gold); }
.choice-btn.locked { opacity:.4; pointer-events:none; }
.choice-btn .choice-req { font-size:10px; color:var(--blood); margin-left:8px; }

/* Action Bar */
.action-bar { grid-column:1/-1; display:flex; align-items:center; justify-content:center; gap:8px; padding:8px 16px;
  background:linear-gradient(0deg, #15151f, #0e0e16); border-top:1px solid var(--border); flex-shrink:0; }
.action-btn { padding:8px 20px; font-size:12px; letter-spacing:2px;
  background:linear-gradient(180deg, #222230, #1a1a24); border:1px solid var(--border); color:var(--text-dim); }
.action-btn:hover { border-color:var(--gold-dim); color:var(--gold); }
.action-btn.primary { border-color:var(--gold-dim); color:var(--gold); }

/* Right Panel */
.right-panel { background:var(--bg-panel); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }

/* Inventory */
.inv-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; padding:8px; }
.inv-slot { aspect-ratio:1; background:#1a1a24; border:1px solid var(--border); display:flex; align-items:center; justify-content:center;
  font-size:20px; cursor:pointer; position:relative; transition:all .2s; }
.inv-slot:hover { border-color:var(--gold-dim); background:#222230; }
.inv-slot.equipped { border-color:var(--gold); box-shadow:inset 0 0 10px #c8a84e33; }
.inv-count { position:absolute; bottom:1px; right:3px; font-size:9px; color:var(--text-dim); }
.inv-slot-tip { display:none; position:absolute; bottom:110%; left:50%; transform:translateX(-50%); background:#1a1a24ee;
  border:1px solid var(--gold-dim); padding:8px 12px; z-index:10; min-width:160px; white-space:nowrap; }
.inv-slot:hover .inv-slot-tip { display:block; }
.tip-name { font-size:12px; color:var(--gold); margin-bottom:3px; }
.tip-desc { font-size:10px; color:var(--text-dim); }
.tip-stats { font-size:10px; color:var(--stamina); margin-top:3px; }

/* Stats Panel */
.stats-list { padding:10px; }
.stat-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; border-bottom:1px solid #1a1a2444; }
.stat-name { font-size:11px; color:var(--text-dim); }
.stat-val { font-size:11px; color:var(--text); }
.stat-val.high { color:var(--gold); }

/* ============================================================
   COMBAT SCREEN
   ============================================================ */
.combat-overlay {
  position:fixed; inset:0; z-index:100;
  display:flex; flex-direction:column;
  background:radial-gradient(ellipse at 50% 40%, #1a0808 0%, #0a0a0f 70%);
  overflow: hidden;
}
.combat-header { text-align:center; padding:12px 16px; flex-shrink:0; }
.combat-enemy-name { font-family:var(--font-display); font-size:24px; color:var(--blood-bright); letter-spacing:4px; }
.combat-enemy-lvl { font-size:12px; color:var(--text-dim); }
.combat-scene { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; flex-shrink:0; padding:8px 0; }
.enemy-visual { font-size:72px; filter:drop-shadow(0 0 30px #c6282855); animation: enemyIdle 3s ease-in-out infinite; }
@keyframes enemyIdle { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.enemy-hp-bar { width:280px; height:14px; background:#1a1a24; border:1px solid var(--border); overflow:hidden; }
.enemy-hp-fill { height:100%; background:linear-gradient(90deg, #8b1a1a, #c62828); transition:width .5s; }
.combat-log { flex:1; min-height:60px; overflow-y:auto; padding:8px 16px; background:#0a0a0f88; margin:0 16px; border:1px solid var(--border); }
.combat-log-entry { font-size:12px; margin-bottom:3px; animation:fadeInUp .3s; }
.combat-actions { display:flex; flex-wrap:wrap; justify-content:center; gap:6px; padding:10px 12px; flex-shrink:0;
  overflow-y:auto; max-height:35vh;
  padding-bottom: calc(10px + var(--safe-bottom)); }
.combat-btn { padding:9px 18px; font-size:12px; letter-spacing:1px;
  background:linear-gradient(180deg, #2a1515, #1a0a0a); border:1px solid var(--blood); color:#e57373; }
.combat-btn:hover { background:linear-gradient(180deg, #3a2020, #2a1515); box-shadow:0 0 15px #c6282844; color:#ff8a80; }
.combat-btn.magic { border-color:var(--frost-dim); color:var(--frost); background:linear-gradient(180deg, #152030, #0a1520); }
.combat-btn.magic:hover { box-shadow:0 0 15px #4fc3f744; }
.combat-btn.item { border-color:var(--stamina); color:var(--stamina); background:linear-gradient(180deg, #152015, #0a150a); }
.combat-btn.shout-btn { border-color:var(--gold); color:var(--gold); background:linear-gradient(180deg, #2a2010, #1a1508);
  text-transform:uppercase; font-family:var(--font-display); }

/* ============================================================
   MODALS
   ============================================================ */
.modal-overlay { position:fixed; inset:0; background:#000000cc; z-index:200; display:flex; align-items:center; justify-content:center;
  padding: 16px 16px calc(16px + var(--safe-bottom)); }
.modal { background:var(--bg-panel-solid); border:1px solid var(--border-light); padding:24px; max-width:500px; width:100%; max-height:80vh; overflow-y:auto; }
.modal-title { font-family:var(--font-display); font-size:20px; color:var(--gold); letter-spacing:4px; margin-bottom:16px; text-align:center; }
.modal-text { font-size:13px; line-height:1.8; margin-bottom:16px; }
.modal-btn { display:block; width:100%; padding:10px; margin-top:8px; background:linear-gradient(180deg, #222230, #1a1a24);
  border:1px solid var(--border); color:var(--text); font-size:13px; text-align:center; }
.modal-btn:hover { border-color:var(--gold-dim); color:var(--gold); }

/* Level Up */
.levelup-overlay { position:fixed; inset:0; z-index:150; background:radial-gradient(ellipse at 50% 50%, #2a2010 0%, #0a0a0f 60%);
  display:flex; align-items:center; justify-content:center;
  padding: 16px 16px calc(16px + var(--safe-bottom)); }
.levelup-box { text-align:center; }
.levelup-title { font-family:var(--font-display); font-size:36px; color:var(--gold-bright); letter-spacing:8px; margin-bottom:20px;
  text-shadow:0 0 30px #c8a84e88; animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.7} }
.levelup-choose { display:flex; gap:16px; margin-top:20px; justify-content:center; flex-wrap:wrap; }
.levelup-attr { padding:20px; border:1px solid var(--border); cursor:pointer; width:130px; text-align:center; transition:all .3s; }
.levelup-attr:hover { border-color:var(--gold); background:#2a2520; }
.levelup-attr-icon { font-size:30px; margin-bottom:8px; }
.levelup-attr-name { font-size:14px; color:var(--text); }
.levelup-attr-val { font-size:11px; color:var(--text-dim); margin-top:4px; }

/* Shop */
.shop-item { display:flex; align-items:center; padding:8px 12px; border-bottom:1px solid var(--border); cursor:pointer; }
.shop-item:hover { background:#1a1a24; }
.shop-item-icon { font-size:20px; margin-right:10px; }
.shop-item-info { flex:1; }
.shop-item-name { font-size:12px; color:var(--text); }
.shop-item-desc { font-size:10px; color:var(--text-dim); }
.shop-item-price { font-size:12px; color:var(--gold); }

/* Town Panel */
.town-panel { padding:12px; }
.town-name { font-family:var(--font-display); font-size:18px; color:var(--gold); letter-spacing:3px; margin-bottom:4px; }
.town-desc { font-size:12px; color:var(--text-dim); line-height:1.6; margin-bottom:12px; }
.town-actions { display:flex; flex-direction:column; gap:6px; }
.town-btn { padding:10px 14px; font-size:12px; text-align:left; background:#1a1a24; border:1px solid var(--border); color:var(--text); }
.town-btn:hover { border-color:var(--gold-dim); color:var(--gold); background:#222230; }
.town-btn-icon { margin-right:8px; }
.travel-section { margin-top:12px; padding-top:10px; border-top:1px solid var(--border); }
.travel-section-title { font-size:10px; color:var(--text-dim); letter-spacing:2px; margin-bottom:6px; }
.travel-btn { padding:8px 12px; font-size:11px; text-align:left; background:#12121a; border:1px solid #1e1e28; color:var(--text-dim); width:100%; margin-bottom:4px; }
.travel-btn:hover { border-color:var(--gold-dim); color:var(--gold); background:#1a1a24; }
.travel-btn .travel-dist { float:right; font-size:10px; opacity:.6; }
.quest-hint { margin-top:10px; padding:10px 12px; background:#2a201088; border:1px solid var(--gold-dim); font-size:12px; color:var(--gold); line-height:1.6; }
.quest-hint-label { font-size:10px; letter-spacing:2px; color:var(--gold-dim); margin-bottom:4px; }
.author-info { font-size:10px; color:var(--text-dim); letter-spacing:1px; margin-left:auto; }

/* Travel overlay */
.travel-overlay { position:fixed; inset:0; z-index:80; background:#0a0a0fee; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.travel-text { font-family:var(--font-display); font-size:18px; color:var(--text-dim); letter-spacing:4px; margin-bottom:16px; }
.travel-bar { width:300px; height:4px; background:#1a1a24; overflow:hidden; }
.travel-fill { height:100%; background:var(--gold); transition:width .3s; }

/* Animations */
@keyframes screenShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
.shake { animation: screenShake .15s ease 3; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.fade-in { animation:fadeIn .5s ease; }

/* Snow Particles */
.snow-container { position:fixed; inset:0; pointer-events:none; z-index:50; overflow:hidden; }
.snowflake { position:absolute; color:#fff; opacity:.6; animation:snowfall linear infinite; }
@keyframes snowfall { 0%{transform:translateY(-10px) rotate(0deg)} 100%{transform:translateY(100vh) rotate(360deg)} }

/* Notification */
.notif {
  position:fixed; top:60px; left:50%; transform:translateX(-50%);
  padding:10px 30px; background:#1a1a24ee;
  border:1px solid var(--gold-dim); color:var(--gold); font-size:13px;
  z-index:300; animation:notifIn .5s ease; pointer-events:none;
  white-space:nowrap; max-width:90vw; overflow:hidden; text-overflow:ellipsis;
}
@keyframes notifIn { from{opacity:0;transform:translateX(-50%) translateY(-20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

/* ============================================================
   MOBILE LAYOUT
   ============================================================ */
@media (max-width: 768px) {

  /* Hide desktop-only elements */
  .left-panel, .right-panel, .action-bar, .compass, .author-info { display:none !important; }

  /* Game container: single column, full height */
  .game-container {
    grid-template-columns: 1fr !important;
    grid-template-rows: auto 1fr !important;
    height: 100dvh !important;
    overflow: hidden;
  }

  /* Top bar: auto height, wraps content */
  .top-bar {
    grid-column: 1 / -1;
    height: auto !important;
    min-height: 44px;
    padding: 6px 10px;
    gap: 4px;
    flex-wrap: wrap;
    flex-shrink: 0 !important;
  }

  .top-info {
    flex: 0 0 100%;
    order: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: 0;
  }

  .stat-bars {
    flex: 0 0 100%;
    order: 2;
    gap: 4px;
    justify-content: flex-start;
  }

  .stat-bar { gap: 3px; }
  .bar-track { width: 68px; height: 9px; }
  .bar-value { font-size: 9px; min-width: 34px; }
  .bar-label { font-size: 9px; min-width: 14px; }
  .top-level { font-size: 12px; }
  .top-gold { font-size: 12px; }
  .top-time { font-size: 10px; margin-left: auto; }

  /* Center panel: fills remaining grid row space */
  .center-panel {
    grid-column: 1 / -1;
    overflow: hidden !important;
    display: flex !important;
    flex-direction: column !important;
    min-height: 0 !important;
  }

  /* Narrative area: scrollable, takes remaining space */
  .narrative-area {
    flex: 1 !important;
    min-height: 0 !important;
    overflow-y: auto !important;
    padding: 12px 14px !important;
  }

  /* Choices area: NEVER shrink */
  .choices-area {
    flex-shrink: 0 !important;
    padding: 6px 10px calc(8px + var(--safe-bottom)) !important;
  }

  .narr-text { font-size: 14px; line-height: 1.8; }
  .narr-text.shout { font-size: 15px; }

  .choice-btn { padding: 11px 12px; font-size: 13px; min-height: 44px; margin-bottom: 5px; }

  /* Town panel */
  .town-panel { padding: 10px; }
  .town-name { font-size: 15px; }
  .town-btn { padding: 11px 12px; font-size: 12px; min-height: 44px; }
  .travel-btn { padding: 10px 12px; min-height: 40px; }

  /* Title screen */
  .title-dragon { font-size: 72px; }
  .title-text { font-size: 30px; letter-spacing: 6px; }
  .title-sub { font-size: 14px; letter-spacing: 4px; margin-bottom: 28px; }
  .title-btn { width: 240px; font-size: 14px; padding: 14px 0; min-height: 48px; }

  /* Character creation */
  .race-grid { grid-template-columns: repeat(5, 1fr); gap: 4px; }
  .race-card { padding: 8px 3px; }
  .race-icon { font-size: 20px; }
  .race-name { font-size: 10px; }
  .race-bonus { display: none; }
  .cc-confirm { padding: 14px 36px; }

  /* Combat */
  .combat-header { padding: 8px 12px; }
  .combat-enemy-name { font-size: 18px; letter-spacing: 2px; }
  .combat-scene { gap: 8px; padding: 4px 0; }
  .enemy-visual { font-size: 56px; }
  .enemy-hp-bar { width: 220px; height: 11px; }
  .combat-log { margin: 0 10px; padding: 6px 10px; font-size: 11px; }
  .combat-log-entry { font-size: 11px; }
  .combat-actions { gap: 5px; padding: 8px 8px calc(8px + var(--safe-bottom)); max-height: 38vh; }
  .combat-btn { padding: 9px 12px; font-size: 11px; letter-spacing: 0; }

  /* Level up */
  .levelup-title { font-size: 22px; letter-spacing: 4px; }
  .levelup-attr { padding: 14px; width: 95px; }
  .levelup-attr-icon { font-size: 24px; }
  .levelup-attr-name { font-size: 12px; }

  /* Modal */
  .modal { padding: 18px 14px; max-height: 80vh; }
  .modal-title { font-size: 16px; }
  .modal-btn { padding: 12px; min-height: 44px; }

  /* Shop */
  .shop-item { padding: 10px 8px; min-height: 44px; }

  /* Notification: above bottom nav */
  .notif {
    top: auto;
    bottom: calc(var(--nav-height) + var(--safe-bottom) + 8px);
    font-size: 12px;
    padding: 8px 18px;
  }

  /* Travel */
  .travel-text { font-size: 15px; letter-spacing: 2px; }
  .travel-bar { width: 220px; }

  /* Map */
  .map-loc-icon { font-size: 14px; }
  .map-loc-name { font-size: 8px; }

  /* Inventory tooltip */
  .inv-slot-tip { bottom: auto; top: 110%; left: 50%; transform: translateX(-50%); z-index: 200; }
  .inv-grid { grid-template-columns: repeat(5, 1fr); gap: 4px; padding: 6px; }
  .inv-slot { font-size: 20px; }

  /* Quest log */
  .ql-item { padding: 8px 10px; min-height: 40px; }

  /* Stats */
  .stat-row { padding: 6px 0; }
  .stat-name { font-size: 12px; }
  .stat-val { font-size: 12px; }
}

/* ============================================================
   MOBILE BOTTOM NAV
   ============================================================ */
.mobile-nav {
  display: none;
}

@media (max-width: 768px) {
  .mobile-nav {
    display: flex;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: calc(var(--nav-height) + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    background: linear-gradient(0deg, #15151f, #0e0e16);
    border-top: 1px solid var(--border);
    z-index: 60;
    flex-direction: row;
    align-items: stretch;
  }

  .mobile-nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 0.5px;
    padding: 4px 2px 0;
    border-top: 2px solid transparent;
    transition: all .2s;
    min-width: 44px;
  }

  .mobile-nav-btn.active {
    color: var(--gold);
    border-top-color: var(--gold-dim);
  }

  .mobile-nav-btn .nav-icon {
    font-size: 19px;
    line-height: 1;
  }

  /* Push content above fixed nav */
  .game-container {
    padding-bottom: calc(var(--nav-height) + var(--safe-bottom));
  }
}

/* Very small screens */
@media (max-width: 360px) {
  .bar-track { width: 52px; }
  .title-text { font-size: 24px; }
  .race-icon { font-size: 16px; }
  .combat-btn { padding: 8px 8px; font-size: 10px; }
  .levelup-attr { width: 80px; padding: 10px; }
  .mobile-nav-btn { font-size: 9px; }
  .mobile-nav-btn .nav-icon { font-size: 17px; }
}

  shopItems: null,
  pendingLevelUp: false,
};

function createPlayer(name, race) {
  const r = RACES.find(x=>x.id===race);
  return {
    name, race,
    level: 1, xp: 0, xpToNext: 100,
    hp: 100 + (r.stats.hp||0), maxHp: 100 + (r.stats.hp||0),
    mp: 80 + (r.stats.mp||0), maxMp: 80 + (r.stats.mp||0),
    sp: 80 + (r.stats.sp||0), maxSp: 80 + (r.stats.sp||0),
    gold: 50 + (r.stats.gold||0),
    atk: 5, def: 3,
    skills: {
      oneHand: 10 + (r.stats.oneHand||0), twoHand: 10, archery: 10 + (r.stats.archery||0),
      block: 10, heavyArmor: 10 + (r.stats.heavyArmor||0), lightArmor: 10,
      destruction: 10 + (r.stats.destruction||0), restoration: 10,
      sneak: 10 + (r.stats.sneak||0), lockpick: 10 + (r.stats.lockpick||0),
      alchemy: 10, smithing: 10, enchant: 10 + (r.stats.enchant||0), speech: 10 + (r.stats.speech||0),
    },
    weapon: {...WEAPONS[0], type:'melee'},
    armor: {...ARMORS[0], type:'armor'},
    inventory: [],
    spells: [SPELLS[0], SPELLS[3]],
    shouts: [],
    perks: [],
    resistances: { fire: r.stats.fire||0, frost: r.stats.frost||0, shock:0, poison: r.stats.poison||0, magic: r.stats.magicRes||0 },
    carryWeight: 0, maxCarryWeight: 300,
  };
}

function getPlayerAtk() {
  let base = G.player.weapon.atk + G.player.atk;
  let skillBonus = G.player.weapon.type === 'ranged' ? G.player.skills.archery * 0.3 : G.player.skills.oneHand * 0.3;
  return Math.floor(base + skillBonus);
}
function getPlayerDef() {
  let base = G.player.armor.def + G.player.def;
  let skillBonus = G.player.armor.tier >= 4 ? G.player.skills.heavyArmor * 0.2 : G.player.skills.lightArmor * 0.2;
  return Math.floor(base + skillBonus);
}

function notify(msg) {
  G.notifications.push({msg, time:Date.now()});
  renderNotifications();
  setTimeout(()=>{ G.notifications.shift(); renderNotifications(); }, 3000);
}

function addNarrative(text, cls='') {
  G.narrative.push({text, cls, time:Date.now()});
  if(G.narrative.length > 50) G.narrative = G.narrative.slice(-40);
}
function clearNarrative() { G.narrative = []; }

function advanceTime(hours) {
  G.dayTime += hours;
  while(G.dayTime >= 24) { G.dayTime -= 24; G.day++; }
  if(Math.random() < 0.2) {
    const weathers = ['clear','cloudy','rain','snow','blizzard','fog'];
    const loc = LOCATIONS.find(l=>l.id===G.currentLocation);
    if(loc && (loc.region==='冰原'||loc.region==='冻原'||loc.region==='雪山')) {
      G.weather = ['clear','snow','blizzard','snow'][Math.floor(Math.random()*4)];
    } else if(loc && loc.region==='沼泽') {
      G.weather = ['fog','rain','cloudy','fog'][Math.floor(Math.random()*4)];
    } else {
      G.weather = weathers[Math.floor(Math.random()*weathers.length)];
    }
  }
}

function getTimeString() {
  const h = Math.floor(G.dayTime);
  const m = Math.floor((G.dayTime-h)*60);
  return `第${G.day}天 ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
}

function getWeatherIcon() {
  return {clear:'☀️',cloudy:'☁️',rain:'🌧️',snow:'❄️',blizzard:'🌨️',fog:'🌫️'}[G.weather]||'☀️';
}

function travelTo(locId) {
  if(locId === G.currentLocation) return;
  const from = LOCATIONS.find(l=>l.id===G.currentLocation);
  const to = LOCATIONS.find(l=>l.id===locId);
  if(!to) return;
  const dist = Math.sqrt((from.x-to.x)**2+(from.y-to.y)**2);
  const travelTime = Math.max(1, dist/15);
  G.travelTarget = locId;
  G.travelProgress = 0;
  G.screen = 'travel';
  render();

  const steps = 20;
  let step = 0;
  const interval = setInterval(()=>{
    step++;
    G.travelProgress = step/steps;
    renderTravelProgress();
    if(step >= steps) {
      clearInterval(interval);
      const encounterChance = G.weather==='blizzard'?0.4:G.weather==='snow'?0.25:0.15;
      if(Math.random() < encounterChance && to.type!=='special') {
        finishTravel(locId, travelTime);
        triggerRandomEncounter();
      } else {
        finishTravel(locId, travelTime);
      }
    }
  }, 80);
}

function finishTravel(locId, hours) {
  G.currentLocation = locId;
  if(!G.discoveredLocations.includes(locId)) {
    G.discoveredLocations.push(locId);
    notify('发现新地点: ' + LOCATIONS.find(l=>l.id===locId).name);
  }
  advanceTime(hours||2);
  G.screen = 'game';
  G.activeRandomQuest = null;
  G.currentScene = null;
  G.choices = [];
  G.mobileTab = 'story';
  const loc = LOCATIONS.find(l=>l.id===locId);
  clearNarrative();
  addNarrative(`你来到了${loc.name}。`, 'important');
  addNarrative(loc.desc);
  if(loc.type==='city'||loc.type==='town'||loc.type==='village') {
    generateRandomQuests(locId);
  }
  checkQuestTriggers();
  if(!G.currentScene) render();
  autoSave();
}

function triggerRandomEncounter() {
  const enemies = ['wolf','wolf','bandit','bandit','skeleton','spider'];
  const loc = LOCATIONS.find(l=>l.id===G.currentLocation);
  if(loc && (loc.region==='冰原'||loc.region==='冻原')) enemies.push('troll');
  if(loc && loc.region==='沼泽') enemies.push('vampire');
  const eId = enemies[Math.floor(Math.random()*enemies.length)];
  addNarrative('旅途中，你遭遇了敌人！', 'combat');
  startCombat(eId);
}

function getCurrentMainQuest() {
  return MAIN_QUESTS[G.mainQuestProgress] || null;
}

function checkQuestTriggers() {
  const mq = getCurrentMainQuest();
  if(mq && mq.location === G.currentLocation && !G.completedQuests.includes(mq.id)) {
    if(!mq.requireQuest || G.completedQuests.includes(mq.requireQuest)) {
      if(!G.currentScene || G.currentScene.quest.id !== mq.id) {
        G.activeQuests = G.activeQuests.filter(q=>q!==mq.id);
        G.activeQuests.push(mq.id);
        startQuestScene(mq);
      }
    }
  }
}

function startQuestScene(quest) {
  G.currentScene = { quest, sceneIdx:0 };
  showScene(quest.scenes[0], quest);
}

function showScene(scene, quest) {
  if(!scene) return;
  addNarrative('', 'divider');
  if(scene.text) addNarrative(scene.text, scene.important?'important':'');

  G.choices = scene.choices.map(c => ({
    text: c.text,
    action: () => {
      if(c.next === 'complete') {
        completeQuestScene(quest);
      } else if(c.next === 'combat') {
        G.currentScene.combatNext = (G.currentScene.sceneIdx||0) + 1;
        const enemyId = c.combat || 'bandit';
        if(enemyId === 'alduin_1') {
          startCombat('alduin', {name:'奥杜因（受创）', hp:400, atk:50, def:25});
        } else {
          startCombat(enemyId);
        }
      } else if(typeof c.next === 'number') {
        G.currentScene.sceneIdx = c.next;
        showScene(quest.scenes[c.next], quest);
        render();
      }
    },
    locked: c.require && !meetsRequirement(c.require),
    requirement: c.require
  }));
  render();
}

function completeQuestScene(quest) {
  if(!G.completedQuests.includes(quest.id)) {
    G.completedQuests.push(quest.id);
    G.activeQuests = G.activeQuests.filter(q=>q!==quest.id);
    if(quest.rewards) {
      const r = quest.rewards;
      if(r.xp) gainXP(r.xp);
      if(r.gold) { G.player.gold += r.gold; notify(`获得 ${r.gold} 金币`); }
      if(r.items) {
        r.items.forEach(iid => {
          const item = findItemById(iid);
          if(item) { addToInventory(item); notify(`获得: ${item.name}`); }
        });
      }
      if(r.shout) {
        const s = SHOUTS.find(x=>x.id===r.shout);
        if(s && !G.player.shouts.find(x=>x.id===s.id)) {
          G.player.shouts.push(s);
          addNarrative(`你学会了新的龙吼: ${s.name} (${s.words.join(' ')})`, 'shout');
          notify(`习得龙吼: ${s.name}`);
        }
      }
    }
    addNarrative(`—— 任务完成: ${quest.name} ——`, 'system');
    notify(`任务完成: ${quest.name}`);
    if(quest.id.startsWith('mq')) {
      G.mainQuestProgress = MAIN_QUESTS.findIndex(q=>q.id===quest.id) + 1;
      const nextMq = getCurrentMainQuest();
      if(nextMq) {
        const targetLoc = LOCATIONS.find(l=>l.id===nextMq.location);
        if(targetLoc) {
          addNarrative(`\n下一步: 前往${targetLoc.name}，开始「${nextMq.name}」`, 'important');
          if(!G.discoveredLocations.includes(nextMq.location)) {
            G.discoveredLocations.push(nextMq.location);
          }
        }
      } else {
        addNarrative('\n恭喜你完成了全部主线任务！天霜省的冒险仍在继续...', 'important');
      }
    }
    G.currentScene = null;
    G.choices = [];
  }
  render();
}

function meetsRequirement(req) {
  if(req && req.quest) return G.completedQuests.includes(req.quest);
  if(req && req.item) return G.player.inventory.some(i=>i.id===req.item);
  return true;
}

function startSideQuest(chainId) {
  const chain = SIDE_QUEST_CHAINS[chainId];
  if(!chain) return;
  const progress = G.sideQuestProgress[chainId];
  if(progress >= chain.quests.length) { notify('这条支线已全部完成'); return; }
  const quest = chain.quests[progress];
  if(G.activeQuests.includes(quest.id)) return;
  G.activeQuests.push(quest.id);
  addNarrative(`—— 开始支线任务: ${quest.name} ——`, 'system');
  startQuestScene(quest);
}

function completeSideQuest(chainId) {
  const chain = SIDE_QUEST_CHAINS[chainId];
  const progress = G.sideQuestProgress[chainId];
  const quest = chain.quests[progress];
  completeQuestScene(quest);
  G.sideQuestProgress[chainId]++;
}

function generateRandomQuests(locId) {
  G.randomQuests = [];
  const loc = LOCATIONS.find(l=>l.id===locId);
  const count = 3 + Math.floor(Math.random()*2);
  const rep = G.townReputation[locId] || 0;

  for(let i=0; i<count; i++) {
    const tmpl = RANDOM_QUEST_TEMPLATES[Math.floor(Math.random()*RANDOM_QUEST_TEMPLATES.length)];
    let name = tmpl.name, desc = tmpl.desc;
    let enemy = null, reward_xp, reward_gold;

    if(tmpl.type==='hunt') {
      const eId = tmpl.enemies[Math.floor(Math.random()*tmpl.enemies.length)];
      enemy = ENEMIES[eId];
      name = name.replace('{enemy}', enemy.name);
      desc = desc.replace('{enemy}', enemy.name).replace('{location}', loc.name);
      reward_xp = Math.floor(enemy.xp * tmpl.xpMult * (1 + rep*0.1));
      reward_gold = Math.floor((enemy.gold+20) * tmpl.goldMult * (1 + rep*0.1));
    } else if(tmpl.type==='gather') {
      const item = tmpl.items[Math.floor(Math.random()*tmpl.items.length)];
      const npc = NPC_NAMES[Math.floor(Math.random()*NPC_NAMES.length)];
      const cnt = 3+Math.floor(Math.random()*5);
      name = name.replace('{item}', item);
      desc = desc.replace('{item}',item).replace('{npc}',npc).replace('{count}',cnt);
      reward_xp = Math.floor(30 * tmpl.xpMult * (1+rep*0.1));
      reward_gold = Math.floor(40 * tmpl.goldMult * (1+rep*0.1));
    } else if(tmpl.type==='escort') {
      const dests = LOCATIONS.filter(l=>l.type==='city'&&l.id!==locId);
      const dest = dests[Math.floor(Math.random()*dests.length)];
      desc = desc.replace('{destination}', dest?dest.name:'临近城镇');
      reward_xp = Math.floor(50 * tmpl.xpMult * (1+rep*0.1));
      reward_gold = Math.floor(60 * tmpl.goldMult * (1+rep*0.1));
    } else if(tmpl.type==='investigate') {
      const ev = tmpl.events[Math.floor(Math.random()*tmpl.events.length)];
      name = name.replace('{event}', ev);
      desc = desc.replace('{event}',ev).replace('{location}',loc.name);
      reward_xp = Math.floor(40 * tmpl.xpMult * (1+rep*0.1));
      reward_gold = Math.floor(35 * tmpl.goldMult * (1+rep*0.1));
    } else if(tmpl.type==='clear') {
      const dng = tmpl.dungeons[Math.floor(Math.random()*tmpl.dungeons.length)];
      name = name.replace('{dungeon}', dng);
      desc = desc.replace('{dungeon}', dng);
      reward_xp = Math.floor(60 * tmpl.xpMult * (1+rep*0.1));
      reward_gold = Math.floor(50 * tmpl.goldMult * (1+rep*0.1));
    }

    G.randomQuests.push({
      id: `rq_${locId}_${i}_${Date.now()}`,
      type: tmpl.type, name, desc, icon: tmpl.icon,
      enemy: enemy ? Object.keys(ENEMIES).find(k=>ENEMIES[k]===enemy) : 'bandit',
      xp: reward_xp||30, gold: reward_gold||20,
      location: locId,
    });
  }
}

function acceptRandomQuest(idx) {
  const q = G.randomQuests[idx];
  if(!q) return;
  G.activeRandomQuest = q;
  G.mobileTab = 'story';
  clearNarrative();
  addNarrative(`—— 接受任务: ${q.name} ——`, 'system');
  addNarrative(q.desc);

  if(q.type==='hunt' || q.type==='clear') {
    addNarrative('你出发寻找目标...');
    advanceTime(0.5);
    G.choices = [{
      text: '开始战斗',
      action: () => {
        startCombat(q.enemy, null, ()=>{ completeRandomQuest(q); });
      }
    }];
  } else if(q.type==='gather') {
    addNarrative('你开始在周围搜寻所需物资...');
    advanceTime(1);
    const success = Math.random() < 0.7 + G.player.skills.alchemy*0.005;
    if(success) {
      addNarrative('经过仔细搜索，你成功收集了所需的物资。');
      completeRandomQuest(q);
    } else {
      addNarrative('搜索过程中，你遭到了野兽的攻击！');
      G.choices = [{text:'战斗！', action:()=>startCombat('wolf',null,()=>completeRandomQuest(q))}];
    }
  } else if(q.type==='escort') {
    addNarrative('你与商队一同出发。路途中可能会遭遇危险...');
    advanceTime(2);
    if(Math.random()<0.6) {
      addNarrative('强盗从路旁杀出！你必须保护商队！', 'combat');
      G.choices = [{text:'保护商队！', action:()=>startCombat('bandit',null,()=>completeRandomQuest(q))}];
    } else {
      addNarrative('商队安全抵达目的地。商人感激地向你支付了报酬。');
      completeRandomQuest(q);
    }
  } else if(q.type==='investigate') {
    addNarrative('你开始调查周围的异常情况...');
    advanceTime(1);
    const r = Math.random();
    if(r<0.4) {
      addNarrative('调查中你发现了敌人的踪迹！', 'combat');
      G.choices = [{text:'迎战！', action:()=>startCombat('draugr',null,()=>completeRandomQuest(q))}];
    } else {
      addNarrative('经过仔细调查，你找到了线索并解决了问题。居民们松了一口气。');
      completeRandomQuest(q);
    }
  }
  render();
}

function completeRandomQuest(q) {
  gainXP(q.xp);
  G.player.gold += q.gold;
  G.townReputation[q.location] = (G.townReputation[q.location]||0) + 1;
  addNarrative(`任务完成！获得 ${q.xp} 经验, ${q.gold} 金币`, 'system');
  notify(`任务完成: ${q.name}`);
  if(Math.random()<0.3) {
    const pot = POTIONS[Math.floor(Math.random()*3)];
    addToInventory({...pot});
    addNarrative(`额外获得: ${pot.name}`, 'system');
  }
  G.activeRandomQuest = null;
  G.choices = [];
  render();
}

function startCombat(enemyId, overrides, onWinCallback) {
  const template = ENEMIES[enemyId] || ENEMIES.bandit;
  const levelMult = 1 + (G.player.level-1)*0.15;
  const enemy = {
    ...template,
    id: enemyId,
    hp: Math.floor((overrides?.hp || template.hp) * levelMult),
    maxHp: Math.floor((overrides?.hp || template.hp) * levelMult),
    atk: Math.floor((overrides?.atk || template.atk) * levelMult),
    def: overrides?.def || template.def,
    name: overrides?.name || template.name,
  };
  G.combat = {
    enemy,
    log: [`${enemy.name} 出现了！`],
    turn: 'player',
    onWin: onWinCallback || null,
    shieldActive: false,
    slowActive: false,
    turnCount: 0,
  };
  G.screen = 'combat';
  render();
}

function combatAction(action, param) {
  if(!G.combat || G.combat.turn !== 'player') return;
  const c = G.combat;
  const e = c.enemy;
  const p = G.player;
  c.turnCount++;

  let playerDmg = 0;
  let logMsg = '';

  if(action === 'attack') {
    playerDmg = Math.max(1, getPlayerAtk() - e.def + Math.floor(Math.random()*6));
    const crit = Math.random() < 0.1 + p.skills.oneHand*0.002;
    if(crit) { playerDmg = Math.floor(playerDmg*1.8); logMsg = `暴击！你对${e.name}造成了 ${playerDmg} 点伤害！`; }
    else { logMsg = `你攻击${e.name}，造成 ${playerDmg} 点伤害。`; }
    e.hp -= playerDmg;
    p.sp = Math.max(0, p.sp - 5);
  } else if(action === 'power_attack') {
    if(p.sp < 20) { c.log.push('耐力不足！'); render(); return; }
    playerDmg = Math.max(1, Math.floor(getPlayerAtk()*1.6) - e.def + Math.floor(Math.random()*8));
    logMsg = `你使出强力攻击！造成 ${playerDmg} 点伤害！`;
    e.hp -= playerDmg;
    p.sp -= 20;
  } else if(action === 'block') {
    c.shieldActive = true;
    logMsg = '你举起防御姿态。';
    p.sp -= 5;
  } else if(action === 'spell') {
    const spell = param;
    if(!spell) return;
    if(p.mp < spell.cost) { c.log.push('魔力不足！'); render(); return; }
    p.mp -= spell.cost;
    if(spell.type === 'destruction') {
      let dmg = spell.dmg + p.skills.destruction*0.5;
      if(spell.element === 'fire') dmg *= (1 - (e.fireRes||0)/100);
      playerDmg = Math.floor(dmg);
      logMsg = `你施放${spell.name}！造成 ${playerDmg} 点伤害！`;
      e.hp -= playerDmg;
    } else if(spell.heal) {
      const heal = spell.heal + p.skills.restoration*0.5;
      p.hp = Math.min(p.maxHp, p.hp + Math.floor(heal));
      logMsg = `你施放${spell.name}，恢复了 ${Math.floor(heal)} 点生命。`;
    } else if(spell.shield) {
      c.shieldActive = true;
      logMsg = `你展开${spell.name}，抵挡下一次攻击。`;
    }
  } else if(action === 'shout') {
    const shout = param;
    if(!shout) return;
    if(G.shoutCooldowns[shout.id] && G.shoutCooldowns[shout.id] > 0) {
      c.log.push(`${shout.name}正在冷却中！`); render(); return;
    }
    G.shoutCooldowns[shout.id] = shout.cooldown;
    if(shout.dmg) {
      let dmg = shout.dmg + p.level*3;
      if(shout.effect==='dragonrend' && (e.id==='dragon'||e.id==='alduin'||e.id==='mirmulnir'||e.id==='alduin_1')) dmg *= 2;
      e.hp -= Math.floor(dmg);
      logMsg = `"${shout.words.join(' ').toUpperCase()}！" ${shout.name}造成 ${Math.floor(dmg)} 点伤害！`;
    }
    if(shout.effect==='slow') { c.slowActive = true; logMsg = `"${shout.words.join(' ').toUpperCase()}！" 时间减缓了...`; }
    if(shout.effect==='push') logMsg = `"${shout.words.join(' ').toUpperCase()}！" ${e.name}被震退！`;
  } else if(action === 'item') {
    const item = param;
    if(!item) return;
    removeFromInventory(item);
    if(item.effect==='hp') { p.hp = Math.min(p.maxHp, p.hp + item.value); logMsg = `使用${item.name}，恢复 ${item.value} 点生命。`; }
    else if(item.effect==='mp') { p.mp = Math.min(p.maxMp, p.mp + item.value); logMsg = `使用${item.name}，恢复 ${item.value} 点魔力。`; }
    else if(item.effect==='sp') { p.sp = Math.min(p.maxSp, p.sp + item.value); logMsg = `使用${item.name}，恢复 ${item.value} 点耐力。`; }
  } else if(action === 'flee') {
    const fleeChance = 0.3 + p.skills.sneak*0.005;
    if(Math.random() < fleeChance) {
      c.log.push('你成功逃脱了！');
      G.screen = 'game';
      G.combat = null;
      render();
      return;
    } else {
      logMsg = '逃跑失败！';
    }
  }

  if(logMsg) c.log.push(logMsg);

  if(e.hp <= 0) {
    e.hp = 0;
    c.log.push(`${e.name} 被击败了！`);
    endCombat(true);
    return;
  }

  c.turn = 'enemy';
  render();
  setTimeout(()=>{ enemyTurn(); }, 600);
}

function enemyTurn() {
  const c = G.combat;
  if(!c) return;
  const e = c.enemy;
  const p = G.player;

  let dmg = Math.max(1, e.atk - getPlayerDef() + Math.floor(Math.random()*4) - 2);
  if(c.slowActive) { dmg = Math.floor(dmg*0.5); c.slowActive = false; }
  if(c.shieldActive) {
    dmg = Math.floor(dmg * 0.3);
    c.shieldActive = false;
    c.log.push(`${e.name}的攻击被你格挡！仅受到 ${dmg} 点伤害。`);
  } else {
    const dodgeChance = p.skills.lightArmor*0.003 + p.skills.sneak*0.002;
    if(Math.random() < dodgeChance) {
      c.log.push(`你灵巧地闪避了${e.name}的攻击！`);
      dmg = 0;
    } else {
      c.log.push(`${e.name}攻击你，造成 ${dmg} 点伤害。`);
    }
  }

  p.hp -= dmg;

  Object.keys(G.shoutCooldowns).forEach(k=>{
    if(G.shoutCooldowns[k]>0) G.shoutCooldowns[k]--;
  });

  p.sp = Math.min(p.maxSp, p.sp + 3);
  p.mp = Math.min(p.maxMp, p.mp + 2);

  if(p.hp <= 0) {
    p.hp = 0;
    c.log.push('你倒下了...');
    endCombat(false);
    return;
  }

  c.turn = 'player';
  render();
}

function endCombat(won) {
  const c = G.combat;
  if(!c) return;

  setTimeout(()=>{
    if(won) {
      const e = c.enemy;
      gainXP(ENEMIES[e.id]?.xp || e.xp || 30);
      const goldDrop = ENEMIES[e.id]?.gold || 0;
      if(goldDrop) G.player.gold += goldDrop;
      const lootTable = ENEMIES[e.id]?.loot || [];
      lootTable.forEach(lname=>{
        if(Math.random()<0.5) {
          const item = {id:'loot_'+lname, name:lname, icon:'📦', type:'misc', weight:1};
          addToInventory(item);
        }
      });
      improveSkill('oneHand', 2);
      if(G.player.armor.tier >= 4) improveSkill('heavyArmor',1); else improveSkill('lightArmor',1);

      addNarrative(`你击败了${e.name}！`, 'combat');
      if(goldDrop) addNarrative(`获得 ${goldDrop} 金币`, 'system');

      G.screen = 'game';
      G.combat = null;

      if(G.currentScene && G.currentScene.combatNext !== undefined) {
        const quest = G.currentScene.quest;
        const nextIdx = G.currentScene.combatNext;
        G.currentScene.combatNext = undefined;
        if(quest.scenes[nextIdx]) {
          G.currentScene.sceneIdx = nextIdx;
          showScene(quest.scenes[nextIdx], quest);
        }
      }
      if(c.onWin) c.onWin();
    } else {
      addNarrative('你在战斗中倒下了...', 'combat');
      addNarrative('从上次存档点恢复...', 'system');
      G.screen = 'game';
      G.combat = null;
      G.player.hp = Math.floor(G.player.maxHp * 0.5);
      G.player.mp = Math.floor(G.player.maxMp * 0.5);
      G.player.sp = G.player.maxSp;
      const save = localStorage.getItem('skyrim_autosave');
      if(save) {
        try { loadGameState(JSON.parse(save)); notify('从自动存档恢复'); }
        catch(err) { console.error(err); }
      }
    }
    render();
  }, 1000);
}

function gainXP(amount) {
  G.player.xp += amount;
  while(G.player.xp >= G.player.xpToNext) {
    G.player.xp -= G.player.xpToNext;
    G.player.level++;
    G.player.xpToNext = Math.floor(G.player.xpToNext * 1.4);
    G.pendingLevelUp = true;
    notify(`升级！你现在是 ${G.player.level} 级`);
  }
}

function chooseLevelUpAttr(attr) {
  if(attr === 'hp') { G.player.maxHp += 20; G.player.hp += 20; }
  else if(attr === 'mp') { G.player.maxMp += 20; G.player.mp += 20; }
  else if(attr === 'sp') { G.player.maxSp += 15; G.player.sp += 15; }
  G.player.atk += 1;
  G.player.def += 1;
  G.pendingLevelUp = false;
  render();
}

function improveSkill(skillId, amount) {
  if(G.player.skills[skillId] !== undefined) {
    G.player.skills[skillId] = Math.min(100, G.player.skills[skillId] + amount);
  }
}

function findItemById(id) {
  let item = WEAPONS.find(w=>w.id===id);
  if(item) return {...item, type:'weapon'};
  item = ARMORS.find(a=>a.id===id);
  if(item) return {...item, type:'armor'};
  item = POTIONS.find(p=>p.id===id);
  if(item) return {...item, type:'potion'};
  return null;
}

function addToInventory(item) {
  if(item.type==='potion'||item.effect) {
    const existing = G.player.inventory.find(i=>i.id===item.id);
    if(existing) { existing.count = (existing.count||1)+1; return; }
  }
  item.count = item.count || 1;
  G.player.inventory.push(item);
}

function removeFromInventory(item) {
  const idx = G.player.inventory.findIndex(i=>i.id===item.id);
  if(idx>=0) {
    if(G.player.inventory[idx].count > 1) G.player.inventory[idx].count--;
    else G.player.inventory.splice(idx,1);
  }
}

function equipWeapon(item) {
  G.player.weapon = item;
  notify(`装备: ${item.name}`);
  render();
}
function equipArmor(item) {
  G.player.armor = item;
  notify(`装备: ${item.name}`);
  render();
}

function openShop() {
  G.shopOpen = true;
  const rep = G.townReputation[G.currentLocation] || 0;
  const discount = Math.min(0.3, rep * 0.05);
  const tier = Math.min(7, Math.floor(G.player.level / 3) + 1);
  G.shopItems = [];
  WEAPONS.filter(w=>w.tier<=tier && w.price && !w.questItem).forEach(w=>{
    G.shopItems.push({...w, type:'weapon', shopPrice: Math.floor(w.price*(1-discount))});
  });
  ARMORS.filter(a=>a.tier<=tier && a.price).forEach(a=>{
    G.shopItems.push({...a, type:'armor', shopPrice: Math.floor(a.price*(1-discount))});
  });
  POTIONS.forEach(p=>{
    G.shopItems.push({...p, type:'potion', shopPrice: Math.floor(p.price*(1-discount))});
  });
  render();
}

function buyItem(shopItem) {
  if(G.player.gold < shopItem.shopPrice) { notify('金币不足！'); return; }
  G.player.gold -= shopItem.shopPrice;
  addToInventory({...shopItem});
  notify(`购买了 ${shopItem.name}`);
  render();
}

function sellItem(item) {
  const price = Math.floor((item.price || 10) * 0.4);
  G.player.gold += price;
  removeFromInventory(item);
  notify(`卖出 ${item.name}，获得 ${price} 金币`);
  render();
}

function saveGameState() {
  return {
    player: G.player,
    currentLocation: G.currentLocation,
    mainQuestProgress: G.mainQuestProgress,
    completedQuests: G.completedQuests,
    sideQuestProgress: G.sideQuestProgress,
    townReputation: G.townReputation,
    dayTime: G.dayTime, day: G.day, weather: G.weather,
    discoveredLocations: G.discoveredLocations,
    narrative: G.narrative.slice(-10),
  };
}

function loadGameState(data) {
  G.player = data.player;
  if(G.player.weapon && G.player.weapon.id) {
    const w = WEAPONS.find(x=>x.id===G.player.weapon.id);
    if(w) G.player.weapon = {...w, type:'weapon'};
  }
  if(G.player.armor && G.player.armor.id) {
    const a = ARMORS.find(x=>x.id===G.player.armor.id);
    if(a) G.player.armor = {...a, type:'armor'};
  }
  G.currentLocation = data.currentLocation;
  G.mainQuestProgress = data.mainQuestProgress;
  G.completedQuests = data.completedQuests || [];
  G.sideQuestProgress = data.sideQuestProgress || {companions:0,thieves:0,college:0,darkbrotherhood:0,civilwar:0};
  G.townReputation = data.townReputation || {};
  G.dayTime = data.dayTime || 8;
  G.day = data.day || 1;
  G.weather = data.weather || 'clear';
  G.discoveredLocations = data.discoveredLocations || ['helgen'];
  G.narrative = data.narrative || [];
  G.activeQuests = [];
  G.choices = [];
  G.currentScene = null;
  G.combat = null;
  G.screen = 'game';
  G.mobileTab = 'story';
  G.shopOpen = false;
  G.pendingLevelUp = false;
}

function autoSave() {
  try { localStorage.setItem('skyrim_autosave', JSON.stringify(saveGameState())); }
  catch(e) { console.error('autosave failed',e); }
}

function saveToSlot(slot) {
  try {
    localStorage.setItem(`skyrim_save_${slot}`, JSON.stringify(saveGameState()));
    notify(`存档 ${slot} 保存成功`);
  } catch(e) { notify('保存失败'); }
}

function loadFromSlot(slot) {
  try {
    const data = JSON.parse(localStorage.getItem(`skyrim_save_${slot}`));
    if(data) { loadGameState(data); notify(`存档 ${slot} 加载成功`); render(); }
    else notify('存档为空');
  } catch(e) { notify('加载失败'); }
}

function hasSave(slot) { return !!localStorage.getItem(`skyrim_save_${slot}`); }
function hasAutoSave() { return !!localStorage.getItem('skyrim_autosave'); }

  const app = document.getElementById('app');
  if(G.screen === 'title') { app.innerHTML = renderTitle(); }

  else if(G.screen === 'game') {
    if(isMobile()) app.innerHTML = renderGameMobile();
    else app.innerHTML = renderGame();
  }
  else if(G.screen === 'combat') { app.innerHTML = renderCombat(); }
  else if(G.screen === 'travel') { app.innerHTML = renderTravel(); }

  if(G.pendingLevelUp && G.screen === 'game') {
    app.insertAdjacentHTML('beforeend', renderLevelUp());

  if(G.shopOpen && G.screen === 'game') {
    app.insertAdjacentHTML('beforeend', renderShop());

}

      <div style="flex:1;min-height:0;display:flex;flex-direction:column;background:var(--bg-panel);">
        <div class="panel-tabs" style="flex-shrink:0;">
          <div class="panel-tab active" onclick="showMobileSubTab(event,'inv')">物品</div>

  } else if(G.mobileTab === 'char') {
    tabContent = `

}

function renderMobileTravelList() {
  const currentLoc = LOCATIONS.find(l=>l.id===G.currentLocation);
  const reachable = LOCATIONS.filter(l => {
    if(l.id === G.currentLocation) return false;
    if(l.id === 'sovngarde' && !G.completedQuests.includes('mq9')) return false;
    if(!G.discoveredLocations.includes(l.id) && l.type !== 'city' && l.type !== 'town') return false;
    return true;
  }).sort((a,b) => {
    const dA = Math.sqrt((currentLoc.x-a.x)**2+(currentLoc.y-a.y)**2);
    const dB = Math.sqrt((currentLoc.x-b.x)**2+(currentLoc.y-b.y)**2);
    return dA - dB;
  }).slice(0, 12);

  return reachable.map(l => {
    const dist = Math.sqrt((currentLoc.x-l.x)**2+(currentLoc.y-l.y)**2);
    const distLabel = dist < 15 ? '近' : dist < 30 ? '中' : '远';
    return `<button class="travel-btn" onclick="travelTo('${l.id}');setMobileTab('story')">
      ${l.icon} ${l.name} <span class="travel-dist">${distLabel}</span>
    </button>`;
  }).join('');
}

function renderQuestLog() {
  const mq = getCurrentMainQuest();
  let html = '<div class="quest-log">';

  html += '<div class="ql-section"><div class="ql-header">🐉 主线任务</div>';
  if(mq) {
    html += `<div class="ql-item active"><div class="ql-item-name">第${mq.chapter}章: ${mq.name}</div>
      <div class="ql-item-desc">${mq.desc}</div></div>`;
  } else {
    html += '<div class="ql-item"><div class="ql-item-name" style="color:var(--gold)">主线已完成 🎉</div></div>';
  }
  html += '</div>';

  html += '<div class="ql-section"><div class="ql-header">📜 支线任务</div>';
  Object.entries(SIDE_QUEST_CHAINS).forEach(([key, chain])=>{
    const prog = G.sideQuestProgress[key];
    const total = chain.quests.length;
    const status = prog >= total ? '✅' : `${prog}/${total}`;
    html += `<div class="ql-item" onclick="showSideQuestInfo('${key}')">
      <div class="ql-item-name">${chain.icon} ${chain.name} [${status}]</div>
      <div class="ql-item-desc">起始地: ${LOCATIONS.find(l=>l.id===chain.location)?.name}</div>
    </div>`;
  });
  html += '</div>';

  if(G.randomQuests.length) {
    html += '<div class="ql-section"><div class="ql-header">🔄 当地任务</div>';
    G.randomQuests.forEach((q,i)=>{
      html += `<div class="ql-item" onclick="acceptRandomQuest(${i})">
        <div class="ql-item-name">${q.icon} ${q.name}</div>
        <div class="ql-item-desc">${q.desc}</div>
      </div>`;
    });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function renderStats() {

function renderLocationActions(loc) {
  if(!loc) return '';
  if(G.choices.length > 0) return '';

  let html = '<div class="town-panel">';
  html += `<div class="town-name">${loc.icon} ${loc.name}</div>`;
  html += `<div class="town-desc">${loc.desc}</div>`;
  html += '<div class="town-actions">';

  const mq = getCurrentMainQuest();
  if(mq && mq.location === G.currentLocation && !G.completedQuests.includes(mq.id)) {
    if(!mq.requireQuest || G.completedQuests.includes(mq.requireQuest)) {
      html += `<button class="town-btn" onclick="triggerMainQuest()" style="border-color:var(--gold-dim);color:var(--gold)">
        <span class="town-btn-icon">🐉</span>主线: ${mq.name}
      </button>`;
    }
  }

  Object.entries(SIDE_QUEST_CHAINS).forEach(([key, chain])=>{
    if(chain.location === G.currentLocation) {
      const prog = G.sideQuestProgress[key];
      if(prog < chain.quests.length) {
        const sq = chain.quests[prog];
        if(prog === 0 || G.completedQuests.includes(chain.quests[prog-1].id)) {
          html += `<button class="town-btn" onclick="startSideQuest('${key}')">
            <span class="town-btn-icon">${chain.icon}</span>${chain.name}: ${sq.name}
          </button>`;
        }
      }
    }
  });

  if(G.randomQuests.length && !G.activeRandomQuest) {
    html += '<div style="margin-top:8px;font-size:10px;color:var(--text-dim);letter-spacing:1px">📋 可接取的任务:</div>';
    G.randomQuests.forEach((q,i)=>{
      html += `<button class="town-btn" onclick="acceptRandomQuest(${i})">
        <span class="town-btn-icon">${q.icon}</span>${q.name}
        <span style="float:right;font-size:10px;color:var(--gold)">💰${q.gold} ⭐${q.xp}</span>
      </button>`;
    });
  }

  if(loc.shops) {
    html += `<button class="town-btn" onclick="openShop()"><span class="town-btn-icon">🏪</span>商店</button>`;
    html += `<button class="town-btn" onclick="rest()"><span class="town-btn-icon">🛏️</span>休息 (恢复全部)</button>`;
  }

  if(loc.id === 'winterhold') {
    html += `<button class="town-btn" onclick="learnSpells()"><span class="town-btn-icon">📚</span>学习新法术</button>`;
  }

  if(mq && mq.location !== G.currentLocation) {
    const targetLoc = LOCATIONS.find(l=>l.id===mq.location);
    if(targetLoc && (!mq.requireQuest || G.completedQuests.includes(mq.requireQuest))) {
      html += `<div class="quest-hint">
        <div class="quest-hint-label">🐉 主线指引</div>
        第${mq.chapter}章「${mq.name}」— 前往 ${targetLoc.name}
        <button class="town-btn" style="margin-top:6px;border-color:var(--gold-dim);color:var(--gold)" onclick="travelTo('${mq.location}')">
          🗺️ 前往 ${targetLoc.name}
        </button>
      </div>`;
    }
  }

  html += '<div class="travel-section">';
  html += '<div class="travel-section-title">🗺️ 可前往的地点</div>';
  const currentLoc = LOCATIONS.find(l=>l.id===G.currentLocation);
  const reachable = LOCATIONS.filter(l => {
    if(l.id === G.currentLocation) return false;
    if(l.id === 'sovngarde' && !G.completedQuests.includes('mq9')) return false;
    if(!G.discoveredLocations.includes(l.id) && l.type !== 'city' && l.type !== 'town') return false;
    return true;
  }).sort((a,b) => {
    const dA = Math.sqrt((currentLoc.x-a.x)**2+(currentLoc.y-a.y)**2);
    const dB = Math.sqrt((currentLoc.x-b.x)**2+(currentLoc.y-b.y)**2);
    return dA - dB;
  }).slice(0, 8);

  reachable.forEach(l => {
    const dist = Math.sqrt((currentLoc.x-l.x)**2+(currentLoc.y-l.y)**2);
    const distLabel = dist < 15 ? '近' : dist < 30 ? '中' : '远';
    html += `<button class="travel-btn" onclick="travelTo('${l.id}')">
      ${l.icon} ${l.name} <span class="travel-dist">${distLabel}</span>
    </button>`;
  });
  html += '</div></div></div>';
  return html;
}

    '山脉': 'background:linear-gradient(180deg, #1a1520 0%, #0e0a18 50%, #0a0a0f 100%)',
    '冰原': 'background:linear-gradient(180deg, #1a2535 0%, #0e1828 50%, #0a0a0f 100%)',
    '沼泽': 'background:linear-gradient(180deg, #152018 0%, #0e180e 50%, #0a0a0f 100%)',
    '森林': 'background:linear-gradient(180deg, #0e1a0e 0%, #081208 50%, #0a0a0f 100%)',
    '雪山': 'background:linear-gradient(180deg, #202838 0%, #151a28 50%, #0a0a0f 100%)',
    '异界': 'background:linear-gradient(180deg, #2a2010 0%, #1a1508 50%, #0a0a0f 100%)',
  };
  return bgs[loc.region] || 'background:linear-gradient(180deg, #151520, #0a0a0f)';
}

function bindEvents() {
  const narr = document.getElementById('narrative');
  if(narr) narr.scrollTop = narr.scrollHeight;
  const clog = document.getElementById('combat-log');
  if(clog) clog.scrollTop = clog.scrollHeight;
}

// ============================================================
// GLOBAL FUNCTIONS
// ============================================================

let selectedRace = 'nord';

function selectRace(id) {
  selectedRace = id;
  document.querySelectorAll('.race-card').forEach(el=>el.classList.remove('selected'));
  document.querySelector(`[data-race="${id}"]`)?.classList.add('selected');
  const r = RACES.find(x=>x.id===id);
  const desc = document.getElementById('race-desc');
  if(desc && r) desc.textContent = r.desc;
}

function startNewGame() { G.screen = 'charCreate'; render(); }

function continueGame() {
  if(hasAutoSave()) {
    try {
      const data = JSON.parse(localStorage.getItem('skyrim_autosave'));
      loadGameState(data); render();
    } catch(e) { notify('没有可用的存档'); }
  } else { notify('没有自动存档'); }
}

function showLoadMenu() {
  let html = '<div class="modal-overlay" onclick="this.remove()"><div class="modal" onclick="event.stopPropagation()">';
  html += '<div class="modal-title">读取存档</div>';
  for(let i=1;i<=3;i++) {
    const has = hasSave(i);
    html += `<button class="modal-btn" onclick="loadFromSlot(${i});this.closest('.modal-overlay').remove()">${has?'📁':'📂'} 存档 ${i} ${has?'':'(空)'}</button>`;
  }
  if(hasAutoSave()) {
    html += `<button class="modal-btn" onclick="continueGame();this.closest('.modal-overlay').remove()">💾 自动存档</button>`;
  }
  html += '<button class="modal-btn" onclick="this.closest(\'.modal-overlay\').remove()">返回</button>';
  html += '</div></div>';
  document.getElementById('app').insertAdjacentHTML('beforeend', html);
}

function confirmCharacter() {
  const nameEl = document.getElementById('char-name');
  const name = nameEl ? nameEl.value.trim() || '龙裔' : '龙裔';
  G.player = createPlayer(name, selectedRace);
  G.screen = 'game';
  G.currentLocation = 'helgen';
  G.discoveredLocations = ['helgen','riverwood'];
  G.mainQuestProgress = 0;
  G.completedQuests = [];
  G.sideQuestProgress = {companions:0,thieves:0,college:0,darkbrotherhood:0,civilwar:0};
  G.townReputation = {};
  G.narrative = [];
  G.choices = [];
  G.currentScene = null;
  G.dayTime = 8; G.day = 1; G.weather = 'clear';
  G.mobileTab = 'story';
  G.shopOpen = false;
  G.pendingLevelUp = false;

  const mq = MAIN_QUESTS[0];
  G.activeQuests = [mq.id];
  startQuestScene(mq);
  autoSave();
}

function makeChoice(idx) {
  const choice = G.choices[idx];
  if(choice && !choice.locked && choice.action) {
    G.choices = [];
    choice.action();
    render();
  }
}

function clickMapLocation(locId) {
  if(locId === G.currentLocation) return;
  if(G.currentScene) { notify('请先完成当前事件'); return; }
  const loc = LOCATIONS.find(l=>l.id===locId);
  if(loc.id==='sovngarde' && !G.completedQuests.includes('mq9')) { notify('索恩加德尚不可达'); return; }
  travelTo(locId);
}

function triggerMainQuest() {
  const mq = getCurrentMainQuest();
  if(mq) {
    if(!G.activeQuests.includes(mq.id)) G.activeQuests.push(mq.id);
    startQuestScene(mq);
  }
}

function showLeftTab(tab, e) {
  const el = document.getElementById('left-content');
  if(!el) return;
  document.querySelectorAll('.left-panel .panel-tab').forEach(t=>t.classList.remove('active'));
  if(e && e.target) e.target.classList.add('active');
  if(tab==='map') el.innerHTML = renderMap();
  else if(tab==='quests') el.innerHTML = renderQuestLog();
  else if(tab==='stats') el.innerHTML = renderStats();
}

function showRightTab(tab, e) {
  const el = document.getElementById('right-content');
  if(!el) return;
  document.querySelectorAll('.right-panel .panel-tab').forEach(t=>t.classList.remove('active'));
  if(e && e.target) e.target.classList.add('active');
  if(tab==='inv') el.innerHTML = renderInventory();
  else if(tab==='equip') el.innerHTML = renderEquipment();
  else if(tab==='magic') el.innerHTML = renderMagic();
}

function setMobileTab(tab) {
  G.mobileTab = tab;
  render();
}

function showMobileSubTab(e, tab) {
  const el = document.getElementById('mobile-sub-content');
  if(!el) return;
  const tabs = e.target.closest('.panel-tabs');
  if(tabs) tabs.querySelectorAll('.panel-tab').forEach(t=>t.classList.remove('active'));
  e.target.classList.add('active');
  if(tab==='inv') el.innerHTML = renderInventory();
  else if(tab==='equip') el.innerHTML = renderEquipment();
  else if(tab==='magic') el.innerHTML = renderMagic();
}

function clickInventoryItem(idx) {
  const item = G.player.inventory[idx];
  if(!item) return;
  if(item.type==='weapon') equipWeapon(item);
  else if(item.type==='armor') equipArmor(item);
  else if(item.effect==='hp') {
    G.player.hp = Math.min(G.player.maxHp, G.player.hp + item.value);
    removeFromInventory(item); notify(`使用${item.name}，恢复 ${item.value} 生命`); render();
  } else if(item.effect==='mp') {
    G.player.mp = Math.min(G.player.maxMp, G.player.mp + item.value);
    removeFromInventory(item); notify(`使用${item.name}，恢复 ${item.value} 魔力`); render();
  }
}

function equipItem(id, type) {
  const item = G.player.inventory.find(i=>i.id===id);
  if(!item) return;
  if(type==='weapon') equipWeapon(item);
  else if(type==='armor') equipArmor(item);
}

function rest() {
  G.player.hp = G.player.maxHp;
  G.player.mp = G.player.maxMp;
  G.player.sp = G.player.maxSp;
  advanceTime(8);
  addNarrative('你休息了一夜，恢复了全部体力。', 'system');
  notify('休息完毕，体力完全恢复');
  if(isMobile()) G.mobileTab = 'story';
  autoSave();
  render();
}

function openSaveMenu() {
  let html = '<div class="modal-overlay" onclick="this.remove()"><div class="modal" onclick="event.stopPropagation()">';
  html += '<div class="modal-title">存档管理</div>';
  for(let i=1;i<=3;i++) {
    const has = hasSave(i);
    html += `<div style="display:flex;gap:6px;margin-bottom:6px">
      <button class="modal-btn" style="flex:1" onclick="saveToSlot(${i});this.closest('.modal-overlay').remove()">💾 保存到 ${i}</button>
      ${has?`<button class="modal-btn" style="flex:1" onclick="loadFromSlot(${i});this.closest('.modal-overlay').remove()">📁 读取 ${i}</button>`:''}
    </div>`;
  }
  html += '<button class="modal-btn" onclick="this.closest(\'.modal-overlay\').remove()">关闭</button>';
  html += '</div></div>';
  document.getElementById('app').insertAdjacentHTML('beforeend', html);
}

function openCharSheet() {
  const p = G.player;
  const r = RACES.find(x=>x.id===p.race);
  let html = '<div class="modal-overlay" onclick="this.remove()"><div class="modal" onclick="event.stopPropagation()">';
  html += '<div class="modal-title">角色信息</div>';
  html += `<div style="text-align:center;margin-bottom:12px">
    <div style="font-size:20px;color:var(--gold)">${p.name}</div>
    <div style="font-size:12px;color:var(--text-dim)">${r?.name} · Lv.${p.level} · XP ${p.xp}/${p.xpToNext}</div>
  </div>`;
  html += `<div class="modal-text">
    ❤️ 生命: ${p.hp}/${p.maxHp}<br>
    💜 魔力: ${p.mp}/${p.maxMp}<br>
    💚 耐力: ${p.sp}/${p.maxSp}<br>
    ⚔️ 攻击力: ${getPlayerAtk()} (${p.weapon.name})<br>
    🛡️ 防御力: ${getPlayerDef()} (${p.armor.name})<br>
    💰 金币: ${p.gold}<br><br>
    <strong>已完成任务:</strong> ${G.completedQuests.length}<br>
    <strong>发现地点:</strong> ${G.discoveredLocations.length}/${LOCATIONS.length}<br>
    <strong>龙吼:</strong> ${p.shouts.length ? p.shouts.map(s=>s.name).join(', ') : '无'}
  </div>`;
  html += '<button class="modal-btn" onclick="this.closest(\'.modal-overlay\').remove()">关闭</button>';
  html += '</div></div>';
  document.getElementById('app').insertAdjacentHTML('beforeend', html);
}

function showSideQuestInfo(chainId) {
  const chain = SIDE_QUEST_CHAINS[chainId];
  const prog = G.sideQuestProgress[chainId];
  let html = '<div class="modal-overlay" onclick="this.remove()"><div class="modal" onclick="event.stopPropagation()">';
  html += `<div class="modal-title">${chain.icon} ${chain.name}</div>`;
  html += `<div class="modal-text">起始地: ${LOCATIONS.find(l=>l.id===chain.location)?.name}<br>进度: ${prog}/${chain.quests.length}</div>`;
  chain.quests.forEach((q,i)=>{
    const done = i < prog;
    const current = i === prog;
    html += `<div style="padding:6px 8px;margin:4px 0;border-left:2px solid ${done?'var(--stamina)':current?'var(--gold)':'var(--border)'};
      background:${current?'#1a1a2488':'transparent'};opacity:${done?0.6:1}">
      <div style="font-size:12px;color:${done?'var(--text-dim)':'var(--text)'}">${done?'✅':current?'▶':''} ${q.name}</div>
      <div style="font-size:10px;color:var(--text-dim)">${q.desc}</div>
    </div>`;
  });
  if(chain.quests[prog]?.mainQuestHook) {
    html += `<div style="margin-top:8px;padding:8px;background:#2a201088;border:1px solid var(--gold-dim);font-size:11px;color:var(--gold)">
      ⚡ 此支线与主线任务关联</div>`;
  }
  html += '<button class="modal-btn" onclick="this.closest(\'.modal-overlay\').remove()">关闭</button>';
  html += '</div></div>';
  document.getElementById('app').insertAdjacentHTML('beforeend', html);
}

function learnSpells() {
  const learnable = SPELLS.filter(s => !G.player.spells.find(x=>x.id===s.id) && (!s.reqLevel || G.player.level >= s.reqLevel));
  if(!learnable.length) { notify('没有可学习的新法术'); return; }
  let html = '<div class="modal-overlay" onclick="this.remove()"><div class="modal" onclick="event.stopPropagation()">';
  html += '<div class="modal-title">学习法术</div>';
  learnable.forEach(s=>{
    const cost = (s.reqLevel||1) * 50;
    html += `<div class="shop-item" onclick="learnSpell('${s.id}',${cost});this.closest('.modal-overlay').remove()">
      <span class="shop-item-icon">${s.icon}</span>
      <div class="shop-item-info">
        <div class="shop-item-name">${s.name}</div>
        <div class="shop-item-desc">${s.desc} · 消耗${s.cost}魔力</div>
      </div>
      <span class="shop-item-price">💰${cost}</span>
    </div>`;
  });
  html += '<button class="modal-btn" onclick="this.closest(\'.modal-overlay\').remove()">关闭</button>';
  html += '</div></div>';
  document.getElementById('app').insertAdjacentHTML('beforeend', html);
}

function learnSpell(id, cost) {
  if(G.player.gold < cost) { notify('金币不足'); return; }
  const spell = SPELLS.find(s=>s.id===id);
  if(!spell) return;
  G.player.gold -= cost;
  G.player.spells.push(spell);
  notify(`学会了: ${spell.name}`);
  improveSkill(spell.type==='destruction'?'destruction':'restoration', 3);
  render();
}

function createSnowEffect() {
  if(G.weather !== 'snow' && G.weather !== 'blizzard') {
    const existing = document.querySelector('.snow-container');
    if(existing) existing.remove();
    return;
  }
  let container = document.querySelector('.snow-container');
  if(!container) {
    container = document.createElement('div');
    container.className = 'snow-container';
    document.body.appendChild(container);
  }
  container.innerHTML = '';
  const count = G.weather === 'blizzard' ? 40 : 15;
  for(let i=0; i<count; i++) {
    const flake = document.createElement('div');
    flake.className = 'snowflake';
    flake.textContent = '❄';
    flake.style.left = Math.random()*100 + '%';
    flake.style.fontSize = (4 + Math.random()*8) + 'px';
    flake.style.animationDuration = (3 + Math.random()*5) + 's';
    flake.style.animationDelay = Math.random()*5 + 's';
    container.appendChild(flake);
  }
}

function init() {
  G.screen = 'title';
  render();

  setInterval(()=>{
    if(G.screen === 'game' || G.screen === 'travel') createSnowEffect();
  }, 5000);

  setInterval(()=>{
    if(G.player && G.screen === 'game') autoSave();
  }, 60000);

  let resizeTimer;
  window.addEventListener('resize', ()=>{
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(()=>{
      if(G.screen === 'game') render();
    }, 200);
  });
}

init();
</script>
</body>
</html>
